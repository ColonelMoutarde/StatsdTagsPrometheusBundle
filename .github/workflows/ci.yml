name: Continuous Integration

on: [push]

jobs:
    cs:
        name: Code Style
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.2
                  coverage: xdebug
            - name: Get Composer Cache Directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
            - name: Cache dependencies
              uses: actions/cache@v3
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
                  restore-keys: ${{ runner.os }}-composer-
            - name: Install Dependencies
              run: composer install --no-progress
            - name: Run php-cs-fixer
              env:
                  PHP_CS_FIXER_FUTURE_MODE: 1
              run: bin/php-cs-fixer fix --config=.php-cs-fixer.php --dry-run --no-interaction --diff

    phpunit:
        name: Unit Tests
        runs-on: ubuntu-latest
        env:
            COMPOSER_MEMORY_LIMIT: "-1"
        strategy:
            matrix:
                include:
                    - php: 8.1
                      symfony_version: "6.4.*"
                    - php: 8.2
                      symfony_version: "6.4.*"
                    - php: 8.2
                      symfony_version: "7.0.*"
                    - php: 8.2
                      symfony_version: "7.1.*"
                    - php: 8.3
                      symfony_version: "7.1.*"
                    - php: 8.3
                      symfony_version: "7.2.*"
            fail-fast: false
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: mbstring
                  coverage: xdebug
            - name: Get Composer Cache Directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
            - name: Cache dependencies
              uses: actions/cache@v3
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
                  restore-keys: ${{ runner.os }}-composer-
            - name: Install Symfony ${{ matrix.symfony_version }}
              run: composer require "symfony/framework-bundle:${{ matrix.symfony_version }}" --no-update
              if: matrix.symfony_version != ''
            - name: Install Dependencies
              run: composer update --prefer-dist --no-interaction --optimize-autoloader --prefer-stable --no-progress
            - name: Run PHPUnit
              run: bin/simple-phpunit
              env:
                  SYMFONY_DEPRECATIONS_HELPER: weak
